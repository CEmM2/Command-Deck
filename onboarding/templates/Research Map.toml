[[template]]
id = "journals-guide"
kind = "guide"
name = "Read: journals and venues"
desc = "Journals and topics the lab commonly relies on."
guide = "journals-and-venues.md"

[[template]]
id = "paper-search-keywords"
name = "Build paper search query"
desc = "Print a starter scholarly-search query from topic keywords."
guide = "journals-and-venues.md"
pattern = "echo '\"{topic}\" AND ({method}) AND ({material})'"
dry_run = {}
fields = [
  { key = "topic", label = "Topic", placeholder = "fracture" },
  { key = "method", label = "Method", placeholder = "phase field OR finite element" },
  { key = "material", label = "Material/system", placeholder = "metals OR composites" },
]

[[template]]
id = "reading-notes-template"
name = "Create paper-notes stub"
desc = "Create a Markdown note skeleton for a paper."
guide = "journals-and-venues.md"
pattern = "cat > {file} <<'EOF'\n# Paper notes: {title}\n\n## Citation\n\n## One-sentence claim\n\n## Problem\n\n## Method\n\n## Assumptions\n\n## Results\n\n## Why it matters to our work\n\n## Questions\nEOF"
dry_run = {}
fields = [
  { key = "file", label = "Output file", placeholder = "paper-notes.md" },
  { key = "title", label = "Paper title", placeholder = "Interesting paper" },
]

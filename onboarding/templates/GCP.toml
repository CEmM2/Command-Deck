[[template]]
id = "gcp-basics-guide"
kind = "guide"
name = "Read: GCP basics"
desc = "What Google Cloud Platform is and what we actually use it for."
guide = "gcp-basics.md"

[[template]]
id = "gcp-vm-selection-guide"
kind = "guide"
name = "Read: VM selection guide"
desc = "How to choose VM size, disk, GPU, and when not to choose anything expensive."
guide = "gcp-vm-selection.md"

[[template]]
id = "gcp-cost-safety-guide"
kind = "guide"
name = "Read: cost and safety"
desc = "The rules that stop cloud use from becoming a finance department horror story."
guide = "gcp-cost-safety.md"

[[template]]
id = "gcp-auth-list"
name = "Show gcloud auth"
desc = "Show active gcloud account and project."
guide = "gcp-basics.md"
pattern = "gcloud auth list && echo && gcloud config list"
dry_run = {}
fields = []

[[template]]
id = "gcp-set-project"
name = "Set active project"
desc = "Set the active gcloud project."
guide = "gcp-basics.md"
pattern = "gcloud config set project {project}"
dry_run = {}
fields = [
  { key = "project", label = "Project ID", placeholder = "my-gcp-project" },
]

[[template]]
id = "gcp-list-vms"
name = "List VMs"
desc = "Show Compute Engine instances in a project."
guide = "gcp-basics.md"
pattern = "gcloud compute instances list --project={project}"
dry_run = {}
fields = [
  { key = "project", label = "Project ID", placeholder = "my-gcp-project" },
]

[[template]]
id = "gcp-vm-status"
name = "VM status"
desc = "Show the status of one VM."
guide = "gcp-basics.md"
pattern = "gcloud compute instances describe {vm} --project={project} --zone={zone} --format=\"table(name,status,machineType.basename(),lastStartTimestamp,lastStopTimestamp)\""
dry_run = {}
fields = [
  { key = "vm", label = "VM", placeholder = "gpu-dev" },
  { key = "project", label = "Project", placeholder = "my-gcp-project" },
  { key = "zone", label = "Zone", placeholder = "us-central1-a" },
]

[[template]]
id = "gcp-start-vm"
name = "Start VM"
desc = "Start a stopped Compute Engine VM."
guide = "gcp-cost-safety.md"
pattern = "gcloud compute instances start {vm} --project={project} --zone={zone}"
dry_run = {}
fields = [
  { key = "vm", label = "VM", placeholder = "gpu-dev" },
  { key = "project", label = "Project", placeholder = "my-gcp-project" },
  { key = "zone", label = "Zone", placeholder = "us-central1-a" },
]

[[template]]
id = "gcp-stop-vm"
name = "Stop VM"
desc = "Stop a VM when finished."
guide = "gcp-cost-safety.md"
pattern = "gcloud compute instances stop {vm} --project={project} --zone={zone}"
dry_run = {}
fields = [
  { key = "vm", label = "VM", placeholder = "gpu-dev" },
  { key = "project", label = "Project", placeholder = "my-gcp-project" },
  { key = "zone", label = "Zone", placeholder = "us-central1-a" },
]

[[template]]
id = "gcp-ssh-vm"
name = "SSH into VM"
desc = "Open an SSH session to a VM through gcloud."
guide = "gcp-basics.md"
pattern = "gcloud compute ssh {vm} --project={project} --zone={zone}"
dry_run = {}
fields = [
  { key = "vm", label = "VM", placeholder = "gpu-dev" },
  { key = "project", label = "Project", placeholder = "my-gcp-project" },
  { key = "zone", label = "Zone", placeholder = "us-central1-a" },
]

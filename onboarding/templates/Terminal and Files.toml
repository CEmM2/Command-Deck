[[template]]
id = "terminal-basics-guide"
kind = "guide"
name = "Read: Terminal basics"
desc = "Paths, commands, pipes, redirects, permissions, and the minimum shell survival kit."
guide = "terminal-basics.md"

[[template]]
id = "terminal-where-am-i"
name = "Where am I?"
desc = "Show current directory and files."
guide = "terminal-basics.md"
pattern = "pwd && echo && ls -lah"
dry_run = {}
fields = []

[[template]]
id = "terminal-tree-ish"
name = "Show shallow folder tree"
desc = "Show the first few levels of the current directory without requiring tree."
guide = "terminal-basics.md"
pattern = "find {path} -maxdepth {depth} -print | sed 's#[^/]*/#  #g' | head -{lines}"
dry_run = {}
fields = [
  { key = "path", label = "Path", placeholder = ".", default = "." },
  { key = "depth", label = "Depth", placeholder = "2", default = "2" },
  { key = "lines", label = "Max lines", placeholder = "80", default = "80" },
]

[[template]]
id = "terminal-ripgrep"
name = "Search text with ripgrep"
desc = "Fast recursive text search."
guide = "ripgrep-and-search.md"
pattern = "rg -n --hidden --glob '!*.git/*' {query} {path}"
dry_run = {}
fields = [
  { key = "query", label = "Search text", placeholder = "TODO" },
  { key = "path", label = "Path", placeholder = ".", default = "." },
]

[[template]]
id = "terminal-file-types-guide"
kind = "guide"
name = "Read: File types"
desc = "What .tex, .md, .qmd, .json, .yaml, .toml, .css, and HDF5-like files are for."
guide = "file-types.md"
